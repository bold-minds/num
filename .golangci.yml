version: "2"
run:
  relative-path-mode: wd
linters:
  default: none
  enable:
    - depguard
    - errcheck
    - godox
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        # Production code: stdlib only, zero external dependencies.
        main:
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
        # Test code: stdlib plus the package under test. Black-box
        # `num_test` tests import github.com/bold-minds/num via its
        # public import path, which depguard otherwise rejects.
        tests:
          files:
            - $test
          allow:
            - $gostd
            - github.com/bold-minds/num
    staticcheck:
      # QF1001 wants De Morgan's law applied to the continuation
      # predicates in generateForwardRange / generateBackwardRange
      # (e.g. `if !(i <= end)` → `if i > end`). That rewrite is
      # INCORRECT for floating-point NaN: every comparison with NaN
      # is false, so `!(i <= NaN)` is true (terminates the loop)
      # while `i > NaN` is false (loop continues). The NaN-safety
      # contract of NewNumberRange relies on the `!(...)` form.
      checks:
        - all
        - -QF1001
    errcheck:
      check-type-assertions: true
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        shadow:
          strict: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godot
        source: (noinspection|TODO)
      - linters:
          - gocritic
        source: //noinspection
      - linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      # examples/ holds godoc Example functions — prose, not prod code.
      # They intentionally use weak assertions and short-form patterns
      # to stay readable on pkg.go.dev. Linting them produces churn
      # without catching bugs in the library itself.
      - examples$
issues:
  max-same-issues: 50
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      # examples/ holds godoc Example functions — prose, not prod code.
      # They intentionally use weak assertions and short-form patterns
      # to stay readable on pkg.go.dev. Linting them produces churn
      # without catching bugs in the library itself.
      - examples$
